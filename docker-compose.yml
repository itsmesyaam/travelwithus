version: '3.8'

services:
  # Database container
  db:
    image: postgres:15-alpine
    container_name: travelwithus_db
    restart: always
    environment:
      POSTGRES_USER: travelwithus_admin
      POSTGRES_PASSWORD: travelwithus_password123
      POSTGRES_DB: travelwithus_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelwithus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://travelwithus_admin:travelwithus_password123@db:5432/travelwithus_db
      - JWT_SECRET=supersecrettravelwithuskey1234567890abcdef
    depends_on:
      - db

  # React Frontend (Nginx static serving)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travelwithus_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
