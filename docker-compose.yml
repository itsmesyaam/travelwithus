version: '3.8'

services:
  # Database container
  db:
    image: postgres:15-alpine
    container_name: keralax_db
    restart: always
    environment:
      POSTGRES_USER: keralax_admin
      POSTGRES_PASSWORD: keralax_password123
      POSTGRES_DB: keralax_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keralax_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://keralax_admin:keralax_password123@db:5432/keralax_db
      - JWT_SECRET=supersecretkeralaxkey1234567890abcdef
    depends_on:
      - db

  # React Frontend (Nginx static serving)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keralax_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
