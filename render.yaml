services:
  # FastAPI API service hosting details
  - type: web
    name: travelwithus-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # Provide your Neon PostgreSQL connection string here

